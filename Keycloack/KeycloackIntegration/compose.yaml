services:
  postgres:
    image: postgres:16.2
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloakpassword
    networks:
      - keycloak_network

  keycloackintegration.api:
    image: keycloackintegration.api
    build:
      context: .
      dockerfile: KeycloackIntegration.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - keycloak
    networks:
      - keycloak_network

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    container_name: keycloak
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres/keycloak_db
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloakpassword
      - KC_HTTP_ENABLED=true
    ports:
      - "5050:8080"
    restart: always
    depends_on:
      - postgres
    networks:
      - keycloak_network
    command: start-dev

  keycloackintegration.web:
    build:
      context: ./KeycloackIntegration.Web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - keycloackintegration.api
    networks:
      - keycloak_network

volumes:
  postgres_data:

networks:
  keycloak_network:
    driver: bridge
