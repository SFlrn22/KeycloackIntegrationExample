<div class="min-h-screen bg-slate-100 p-10">
  <div class="mx-auto max-w-5xl">

    <h1 class="mb-8 text-4xl font-bold text-slate-800">
      🌤 Weather Forecast
    </h1>

    @if (forecasts().length > 0) {

      <div class="overflow-hidden rounded-2xl bg-white shadow-xl">

        <table class="min-w-full">

          <thead class="bg-slate-800 text-white">
          <tr>
            <th class="px-6 py-4 text-left">Date</th>
            <th class="px-6 py-4 text-center">🌡 °C</th>
            <th class="px-6 py-4 text-center">🌡 °F</th>
            <th class="px-6 py-4 text-center">Summary</th>
          </tr>
          </thead>

          <tbody>

            @for (forecast of forecasts(); track forecast.date) {

              <tr class="border-b border-slate-200 transition hover:bg-slate-50">

                <td class="px-6 py-5 font-medium text-slate-700">
                  {{ forecast.date }}
                </td>

                <td class="px-6 py-5 text-center font-semibold">
                  {{ forecast.temperatureC }}°
                </td>

                <td class="px-6 py-5 text-center text-slate-600">
                  {{ forecast.temperatureF }}°
                </td>

                <td class="px-6 py-5 text-center">

                  <span
                    class="rounded-full px-4 py-2 text-sm font-semibold"

                    [class]="{
                      'bg-blue-100 text-blue-700': forecast.summary === 'Freezing',
                      'bg-cyan-100 text-cyan-700': forecast.summary === 'Cool',
                      'bg-green-100 text-green-700': forecast.summary === 'Mild',
                      'bg-yellow-100 text-yellow-700': forecast.summary === 'Warm',
                      'bg-orange-100 text-orange-700': forecast.summary === 'Hot',
                      'bg-red-100 text-red-700': forecast.summary === 'Sweltering'
                    }"
                  >
                    {{ forecast.summary }}
                  </span>

                </td>

              </tr>

            }

          </tbody>

        </table>

      </div>

    } @else {

      <div class="rounded-xl bg-white p-8 text-center shadow-lg">
        <p class="text-lg text-slate-600 animate-pulse">
          Loading forecast...
        </p>
      </div>

    }

  </div>
</div>
